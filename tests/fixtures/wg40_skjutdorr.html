up\":\"ProductImageClipped\"},\"faq\":{\"items\":[{\"title\":\"Kan jag best\\u00E4lla partier i specialm\\u00E5tt?\",\"body\":\"\\u003Cp\\u003ESpecialm\\u0026aring;tt kan man f\\u0026aring; mot en extra kostnad (30% till\\u0026auml;gg) p\\u0026aring; fasta partier, skjutf\\u0026ouml;nster och skjutd\\u0026ouml;rrar i serierna WG 40, WG 50, WG 62eco/neo, WG 65 och WG 70.\\u003C/p\\u003E\\n\\u003Cp\\u003EVintertr\\u0026auml;dg\\u0026aring;rd och fasadpartier anpassas alltid till din storlek\\u0026nbsp;utan\\u0026nbsp;extra kostnad, g\\u0026auml;ller serierna WG 80, WG 82, WG 95 och WG 100.\\u003C/p\\u003E\"},{\"title\":\"Vad \\u00E4r s\\u00E4kerhetsglas?\",\"body\":\"\\u003Cp\\u003ES\\u0026auml;kerhetsglas \\u0026auml;r ett h\\u0026auml;rdat glas som \\u0026auml;r flera g\\u0026aring;nger starkare \\u0026auml;n vanligt glas. G\\u0026aring;r ett s\\u0026auml;kerhetsglas s\\u0026ouml;nder blir det m\\u0026aring;nga sm\\u0026aring; bitar som inte \\u0026auml;r vassa, till skillnad fr\\u0026aring;n vanligt glas. S\\u0026auml;kerhetsglas \\u0026auml;r standard i alla v\\u0026aring;ra uterumspartier.\\u003C/p\\u003E\\n\\u003Cp\\u003E\\u0026nbsp;\\u003C/p\\u003E\"},{\"title\":\"Vad inneb\\u00E4r r\\u00E4tv\\u00E4nt och spegelv\\u00E4nt?\",\"body\":\"\\u003Cp\\u003EMed r\\u0026auml;tv\\u0026auml;nt eller spegelv\\u0026auml;nt anger man vilken av d\\u0026ouml;rrarna som ska vara i det yttersta sp\\u0026aring;ret. Har man en mittstolpe i ett uterum kan det vara mer estetiskt att best\\u0026auml;lla ett av frontpartierna spegelv\\u0026auml;nt. R\\u0026auml;tv\\u0026auml;nt \\u0026auml;r standard. \\u003Ca title=\\u0022R\\u0026auml;tv\\u0026auml;nt och spegelv\\u0026auml;nt\\u0022 href=\\u0022/link/5f701172765549ca9efee19069fd03ca.aspx\\u0022 target=\\u0022_top\\u0022\\u003EL\\u0026auml;s mer och se funktionsexempel\\u003C/a\\u003E\\u003C/p\\u003E\"},{\"title\":\"H\\u00E5lm\\u00E5tt - vad \\u00E4r det?\",\"body\":\"\\u003Cp\\u003EH\\u0026aring;lm\\u0026aring;tt \\u0026auml;r m\\u a kvalitet och god funktion till ett riktigt bra pris som dessutom f\\u00F6rl\\u00E4nger din sommar!\\u003C/p\\u003E\\u003Ch2\\u003EVad f\\u00E5r jag som kund?\\u003C/h2\\u003E\\u003Cul\\u003E\\u003Cli\\u003EF\\u00F6rl\\u00E4ngd sommar!\\u003C/li\\u003E\\u003Cli\\u003EKvalitet och funktion till ett riktigt bra pris\\u003C/li\\u003E\\u003Cli\\u003EEtt modernt formspr\\u00E5k\\u003C/li\\u003E\\u003Cli\\u003ESkydd mot v\\u00E4der och vind\\u003C/li\\u003E\\u003Cli\\u003EEn P-m\\u00E4rkt produkt\\u003C/li\\u003E\\u003C/ul\\u003E\\u003Ch2\\u003ESkr\\u00E4ddarsy\\u003C/h2\\u003E\\u003Ch3\\u003ESpecialm\\u00E5tt\\u003C/h3\\u003E\\u003Cp\\u003EOavsett storlek och m\\u00E5tt p\\u00E5 ditt uterum har Willab Garden skjutpartier som passar. Det ger dig m\\u00F6jlighet att skapa ett unikt uterum, anpassat efter ditt hus eller tomtens f\\u00F6ruts\\u00E4ttningar. Uterumspartier med specialm\\u00E5tt tillverkas alltid p\\u00E5 best\\u00E4llning och produceras i v\\u00E5r egen fabrik i B\\u00E5stad.\\u003C/p\\u003E\\u003Ch3\\u003EAnpassa till det du har\\u003C/h3\\u003E\\u003Cp\\u003EHar du redan en stomme eller annan konstruktion beh\\u00F6ver du inte g\\u00F6ra n\\u00E5gon f\\u00F6r\\u00E4ndring i grundkonstruktionen som partierna ska sitta i. Best\\u00E4ll helt enkelt partierna efter dina m\\u00E5tt! Smidigt om du ska fr\\u00E4scha upp ett gammalt uterum med nya partier!\\u003C/p\\u003E\\u003Ch3\\u003EM\\u00E5tta f\\u00F6r dina partier\\u003C/h3\\u003E\\u003Cp\\u003EF\\u00F6r att veta vilken storlek du ska k\\u00F6pa s\\u00E5 m\\u00E4ter du alltid h\\u00E5let. Till en \\u00F6ppning som \\u00E4r 1874 mm bred och 1356 mm h\\u00F6g, s\\u00E5 \\u00E4r det exakt de m\\u00E5tten du ska v\\u00E4lja. Precis s\\u00E5 enkelt \\u00E4r det! Vill du i st\\u00E4llet f\\u00F6rh\\u00E5lla dig till standardm\\u00E5tt s\\u00E5 bara v\\u00E4lj ett och anpassa konstruktionen efter det angivna m\\u00E5ttet. P\\u00E5 WG 40 fast v\\u00E4gg s\\u00E5 r\\u00E4knas det av 19 mm p\\u00E5 h\\u00F6jden f\\u00F6r en inf\\u00E4stningsregel som placeras valbart upptill eller nertill.\\u003C/p\\u003E\\u003Ch3\\u003ER\\u00E4tv\\u00E4nd eller spegelv\\u00E4nd?\\u003C/h3\\u003E\\u003Cp\\u003EHar du valt ett uterum med mittstolpe kan det ur estetisk synvinkel vara snyggt att l\\u00E5ta skjutd\\u00F6rrarna m\\u00F6tas p\\u00E5 mitten i samma profilsp\\u00E5r. D\\u00E5 hamnar b\\u00E5da de d\\u00F6rrarna som m\\u00F6ts mot stolpen i samma sp\\u00E5r i karmen.\\u003C/p\\u003E\\u003Cul\\u003E\\u003Cli\\u003E\\u003Cstrong\\u003ER\\u00E4tv\\u00E4nd \\u003C/strong\\u003E- Skjutpartiets yttersta d\\u00F6rr \\u00E4r p\\u00E5 h\\u00F6ger sida utifr\\u00E5n sett.\\u003C/li\\u003E\\u003Cli\\u003E\\u003Cstrong\\u003ESpegelv\\u00E4nd \\u003C/strong\\u003E- Skjutpartiets yttersta d\\u00F6rr \\u00E4r p\\u00E5 v\\u00E4nster sida utifr\\u00E5n sett.\\u003C/li\\u003E\\u003C/ul\\u003E\\u003Ch2\\u003EUtf\\u00F6rande\\u003C/h2\\u003E\\u003Ch3\\u003EFasta partier\\u003C/h3\\u003E\\u003Cp\\u003EDe fasta partierna har en fl\\u00E4ns p\\u00E5 15 mm runt om hela partiet, f\\u00F6r enkel montering utifr\\u00E5n. Till de fasta partierna f\\u00F6ljer alltid ett regn\\u00ADbleck med, de skyddar fasta partier speciellt i utsatta v\\u00E4derl\\u00E4gen ytterligare fr\\u00E5n l\\u00E4ckage.\\u003C/p\\u003E\\u003Ch3\\u003EEnergiglas\\u003C/h3\\u003E\\u003Cp\\u003EGlaset \\u00E4r ett 4 mm tjockt s\\u00E4kerhetsenergig\\u00ADlas vilket \\u00E4r fem g\\u00E5nger starkare \\u00E4n vanligt glas och \\u00E4r belagt utv\\u00E4ndigt med ett mycket tunt genomskinligt tennoxidskikt. Skiktet skapar i vissa ljusf\\u00F6rh\\u00E5llanden en k\\u00E4nsla av dis i glaset, sk Haze. De positiva f\\u00F6rdelarna med glaset \\u00E4r att det sl\\u00E4pper igenom den varma, kortv\\u00E5giga sole\\u00ADnergin men reflekterar tillbaka den l\\u00E5ngv\\u00E5gi\\u00ADga rumsv\\u00E4rmen in i rummet. Yttemperaturen p\\u00E5 glasets insida blir h\\u00F6gre, vilket g\\u00F6r att risken f\\u00F6r imma och rimfrost minskar.\\u003C/p\\u003E\\
